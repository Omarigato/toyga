version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: toyga-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: toyga_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ../database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d toyga_db']
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: .
    container_name: toyga-backend
    restart: unless-stopped
    ports:
      - '8000:8000'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: toyga_db
      SECRET_KEY: ${SECRET_KEY:-SUPER_SECRET_TOYGA_JWT_KEY_2026_PRODUCTION}
      GOOGLE_DRIVE_CREDENTIALS_JSON: ${GOOGLE_DRIVE_CREDENTIALS_JSON:-}
      GOOGLE_DRIVE_FOLDER_ID: ${GOOGLE_DRIVE_FOLDER_ID:-}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
